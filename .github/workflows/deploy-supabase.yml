name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy transport-scrape  --project-ref wivooargsmcwbiokpklu
          supabase functions deploy data-scrape        --project-ref wivooargsmcwbiokpklu
          supabase functions deploy ai-summary         --project-ref wivooargsmcwbiokpklu
          supabase functions deploy municipality-feed  --project-ref wivooargsmcwbiokpklu
          supabase functions deploy daily-brief        --project-ref wivooargsmcwbiokpklu
          supabase functions deploy social-collect     --project-ref wivooargsmcwbiokpklu
          supabase functions deploy social-analyze     --project-ref wivooargsmcwbiokpklu
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.MUGLAMONITOR_SURETHING }}
