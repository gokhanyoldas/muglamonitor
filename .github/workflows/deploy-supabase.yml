name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:  # manual trigger button in GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        run: |
          supabase functions deploy transport-scrape  --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy data-scrape        --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy ai-summary         --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy municipality-feed  --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy daily-brief        --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
